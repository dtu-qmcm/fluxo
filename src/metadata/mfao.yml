# PURL configuration for http://purl.obolibrary.org/obo/mfao

idspace: MFAO
base_url: /obo/mfao

products:
- mfao.owl: https://raw.githubusercontent.com/dtu-qmcm/mfa_ontology/main/mfao.owl
- mfao.obo: https://raw.githubusercontent.com/dtu-qmcm/mfa_ontology/main/mfao.obo

term_browser: ontobee
example_terms:
- MFAO_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/dtu-qmcm/mfa_ontology/v

- prefix: /tracker/
  replacement: https://github.com/dtu-qmcm/mfa_ontology/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/MFAO?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/dtu-qmcm/mfa_ontology/main/

