id: mfao
title: "Metabolic Flux Analysis Ontology"
github_org: dtu-qmcm
git_main_branch: main
repo: mfao
release_artefacts:
  - base
  - full
  - simple
primary_release: full
export_formats:
  - owl
  - obo
  - json
components:
  products:
      - filename: definitions.owl
      - filename: bfo.owl
import_group:
  use_base_merging: TRUE
  products:
    - id: iao
    - id: cob
robot_java_args: "-Xmx8G"
robot_report:
  use_labels: TRUE
  fail_on: ERROR
  custom_profile: TRUE
  report_on:
    - edit