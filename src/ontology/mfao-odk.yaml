id: mfao
title: "Metabolic Flux Analysis Ontology"
github_org: dtu-qmcm
git_main_branch: main
repo: mfao
release_artefacts:
  - base
  - full
  - simple
primary_release: full
export_formats:
  - owl
  - obo
  - json
import_group:
  use_base_merging: TRUE
  products:
    - id: iao
    - id: bfo
    - id: ro
      use_base: TRUE
    - id: msio
      mirror_from: https://raw.githubusercontent.com/ISA-tools/MSIO/refs/heads/master/releases/1.0/MSIO-merged-reasoned.owl
      make_base: TRUE
      base_iris:
        - http://w3id.org/msio/MSIO_
    - id: sbo
      make_base: TRUE
    - id: obi
      make_base: TRUE
    - id: chebi
      mirror_from: https://raw.githubusercontent.com/obophenotype/chebi_obo_slim/refs/heads/main/chebi_slim.owl
      make_base: TRUE
robot_java_args: "-Xmx8G"
robot_report:
  use_labels: TRUE
  fail_on: ERROR
  custom_profile: TRUE
  report_on:
    - edit